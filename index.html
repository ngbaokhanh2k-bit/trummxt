<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔥 FF Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            background-image: radial-gradient(ellipse at 10% 20%, rgba(255,69,0,0.12) 0%, transparent 50%);
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(145deg, #141414, #1a1a1a);
            border-radius: 24px;
            padding: 24px 20px 28px;
            border: 1px solid rgba(255,69,0,0.15);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #ff4500, #ff6a00, #ff4500);
            border-radius: 26px;
            z-index: -1;
            opacity: 0.25;
            animation: borderGlow 3s ease-in-out infinite;
        }
        @keyframes borderGlow {
            0%,100% { opacity: 0.25; }
            50% { opacity: 0.5; }
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        .logo i {
            -webkit-text-fill-color: initial;
            color: #ff4500;
            margin-right: 6px;
        }
        .subtitle {
            color: #666;
            font-size: 11px;
            letter-spacing: 2px;
            margin-top: 2px;
        }
        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ff88;
            margin-right: 4px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 18px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .tab-btn {
            flex: 1;
            padding: 10px 6px;
            border: none;
            background: transparent;
            color: #555;
            font-size: 13px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .tab-btn i { font-size: 13px; }
        .tab-btn.active {
            background: linear-gradient(135deg, #ff4500, #ff6a00);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255,69,0,0.3);
        }
        .tab-btn:active { transform: scale(0.96); }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            color: #888;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: 0.3s;
        }
        .input-wrapper:focus-within {
            border-color: #ff4500;
            box-shadow: 0 0 0 3px rgba(255,69,0,0.12);
        }
        .input-wrapper i {
            padding: 0 0 0 14px;
            color: #444;
            font-size: 14px;
            min-width: 30px;
        }
        .input-wrapper input, .input-wrapper select {
            flex: 1;
            padding: 13px 12px;
            background: transparent;
            border: none;
            color: #eee;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            border-radius: 12px;
            min-width: 0;
        }
        .input-wrapper input::placeholder {
            color: #333;
        }
        .input-wrapper select {
            appearance: none;
            -webkit-appearance: none;
        }
        .input-wrapper select option {
            background: #1a1a1a;
            color: #eee;
        }
        .toggle-btn {
            background: none;
            border: none;
            color: #444;
            padding: 0 14px 0 0;
            cursor: pointer;
            font-size: 14px;
        }
        .guest-fields { display: none; }
        .guest-fields.show { display: block; }
        .btn-primary {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff4500, #ff6a00);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-primary .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .btn-primary.loading .spinner { display: block; }
        .btn-primary.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result-area {
            margin-top: 16px;
            border-radius: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.04);
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .result-area.show { display: block; }
        .log-line {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            padding: 2px 0;
            color: #888;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            word-break: break-all;
            line-height: 1.5;
        }
        .log-line.success { color: #00ff88; }
        .log-line.error { color: #ff4444; }
        .log-line.warning { color: #ffaa00; }
        .log-line.info { color: #44aaff; }
        .quick-row {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .quick-chip {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 14px;
            font-size: 10px;
            color: #555;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: 0.3s;
            white-space: nowrap;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .quick-chip:active { background: rgba(255,69,0,0.15); }
        .footer {
            text-align: center;
            margin-top: 18px;
            color: #222;
            font-size: 10px;
        }
        .flex-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .btn-sm {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            color: #555;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
            transition: 0.3s;
            text-align: center;
        }
        .btn-sm:active { background: rgba(255,255,255,0.06); }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ff4500; border-radius: 10px; }
        @media (max-width: 400px) {
            .container { padding: 18px 14px 20px; }
            .logo { font-size: 22px; }
            .tab-btn { font-size: 11px; padding: 8px 4px; }
            .input-wrapper input { font-size: 13px; padding: 11px 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo"><i class="fas fa-fire-flame-curved"></i> FF BOT</div>
        <div class="subtitle"><span class="status-dot"></span> sẵn sàng</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('token')"><i class="fas fa-key"></i> Token</button>
        <button class="tab-btn" onclick="switchTab('guest')"><i class="fas fa-user"></i> Guest</button>
    </div>

    <form onsubmit="runBot(event)" id="botForm">
        <!-- TAB TOKEN -->
        <div id="tabToken">
            <div class="form-group">
                <label><i class="fas fa-key"></i> Access Token</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="tokenInput" placeholder="Nhập token của mày" value="">
                    <button type="button" class="toggle-btn" onclick="toggleVis('tokenInput')"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-id-card"></i> Open ID</label>
                <div class="input-wrapper">
                    <i class="fas fa-id-badge"></i>
                    <input type="text" id="openidInput" placeholder="Để trống auto lấy">
                </div>
            </div>
            <div class="quick-row" id="quickTokens"></div>
        </div>

        <!-- TAB GUEST -->
        <div id="tabGuest" style="display:none;">
            <div class="form-group">
                <label><i class="fas fa-hashtag"></i> Guest UID</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="uidInput" placeholder="UID guest">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-shield"></i>
                    <input type="password" id="passInput" placeholder="Password guest">
                    <button type="button" class="toggle-btn" onclick="toggleVis('passInput')"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-globe"></i> Platform</label>
                <div class="input-wrapper">
                    <i class="fas fa-chevron-down" style="font-size:10px;"></i>
                    <select id="platformSelect">
                        <option value="guest">Guest</option>
                        <option value="facebook">Facebook</option>
                        <option value="google">Google</option>
                    </select>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-primary" id="runBtn">
            <span class="btn-text"><i class="fas fa-play"></i> CHẠY BOT</span>
            <div class="spinner"></div>
        </button>
    </form>

    <div class="result-area" id="resultArea">
        <div id="logContainer"></div>
    </div>

    <div class="flex-row">
        <button class="btn-sm" onclick="clearLogs()"><i class="fas fa-eraser"></i> Xóa log</button>
        <button class="btn-sm" onclick="saveTokenNow()"><i class="fas fa-save"></i> Lưu token</button>
        <button class="btn-sm" onclick="pasteToken()"><i class="fas fa-paste"></i> Dán</button>
    </div>

    <div class="footer">⚡ <span id="statusText">Đang chờ</span> ⚡</div>
</div>

<script>
let isRunning = false;
let tokenHistory = [];

// ===== TAB =====
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.textContent.includes(tab === 'token' ? 'Token' : 'Guest'));
    });
    document.getElementById('tabToken').style.display = tab === 'token' ? 'block' : 'none';
    document.getElementById('tabGuest').style.display = tab === 'guest' ? 'block' : 'none';
}

// ===== TOGGLE PASSWORD =====
function toggleVis(id) {
    const inp = document.getElementById(id);
    const icon = inp.parentElement.querySelector('.toggle-btn i');
    if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
    else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
}

// ===== PASTE =====
async function pasteToken() {
    try {
        const text = await navigator.clipboard.readText();
        if (text) document.getElementById('tokenInput').value = text.trim();
        addLog('✅ Đã dán token', 'success');
    } catch { addLog('⚠️ Không thể dán', 'warning'); }
}

// ===== LOG =====
function addLog(msg, type = 'info') {
    const c = document.getElementById('logContainer');
    const d = document.createElement('div');
    d.className = `log-line ${type}`;
    d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    c.appendChild(d);
    c.scrollTop = c.scrollHeight;
    document.getElementById('resultArea').classList.add('show');
    document.getElementById('statusText').textContent = msg.substring(0, 30) + (msg.length > 30 ? '...' : '');
}

function clearLogs() {
    document.getElementById('logContainer').innerHTML = '';
    document.getElementById('resultArea').classList.remove('show');
    document.getElementById('statusText').textContent = 'Đã xóa log';
}

// ===== TOKEN HISTORY =====
function loadTokens() {
    try {
        const raw = localStorage.getItem('ff_tokens');
        if (raw) {
            tokenHistory = JSON.parse(raw);
            const container = document.getElementById('quickTokens');
            container.innerHTML = '';
            tokenHistory.slice(-4).forEach(t => {
                const chip = document.createElement('span');
                chip.className = 'quick-chip';
                chip.textContent = t.substring(0, 10) + '...';
                chip.onclick = () => {
                    document.getElementById('tokenInput').value = t;
                    addLog('✅ Đã điền token', 'success');
                };
                container.appendChild(chip);
            });
        }
    } catch {}
}

function saveTokenNow() {
    const t = document.getElementById('tokenInput').value.trim();
    if (!t) { addLog('⚠️ Không có token', 'warning'); return; }
    try {
        let arr = JSON.parse(localStorage.getItem('ff_tokens') || '[]');
        if (!arr.includes(t)) arr.push(t);
        if (arr.length > 20) arr = arr.slice(-20);
        localStorage.setItem('ff_tokens', JSON.stringify(arr));
        tokenHistory = arr;
        loadTokens();
        addLog('✅ Đã lưu token', 'success');
    } catch { addLog('❌ Lỗi lưu', 'error'); }
}

// ===== RUN BOT =====
async function runBot(e) {
    e.preventDefault();
    if (isRunning) { addLog('⏳ Đang chạy rồi', 'warning'); return; }

    const isToken = document.querySelector('.tab-btn.active').textContent.includes('Token');
    const token = document.getElementById('tokenInput').value.trim();
    const openid = document.getElementById('openidInput').value.trim();
    const uid = document.getElementById('uidInput').value.trim();
    const pass = document.getElementById('passInput').value.trim();
    const platform = document.getElementById('platformSelect').value;

    if (isToken && !token) { addLog('❌ Nhập token đi mày', 'error'); return; }
    if (!isToken && (!uid || !pass)) { addLog('❌ Nhập UID và password', 'error'); return; }
    if (isToken && token) saveTokenNow();

    isRunning = true;
    const btn = document.getElementById('runBtn');
    btn.disabled = true;
    btn.classList.add('loading');
    addLog('🚀 Đang chạy...', 'info');

    try {
        const res = await fetch('/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                mode: isToken ? 'token' : 'guest',
                token: token,
                openid: openid,
                uid: uid,
                password: pass,
                platform: platform
            })
        });

        if (!res.ok) throw new Error(await res.text() || 'Lỗi server');

        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            const lines = decoder.decode(value).split('\n');
            for (const line of lines) {
                if (!line.trim()) continue;
                try {
                    const msg = JSON.parse(line);
                    addLog(msg.message, msg.type || 'info');
                } catch {
                    addLog(line.trim(), 'info');
                }
            }
        }
        addLog('✅ Xong!', 'success');
    } catch (err) {
        addLog('❌ Lỗi: ' + err.message, 'error');
    }

    isRunning = false;
    btn.disabled = false;
    btn.classList.remove('loading');
}

// ===== AUTO GET OPENID =====
document.getElementById('tokenInput').addEventListener('blur', async function() {
    const token = this.value.trim();
    if (!token) return;
    if (document.getElementById('openidInput').value.trim()) return;
    try {
        const res = await fetch(`https://100067.connect.garena.com/oauth/token/inspect?token=${token}`);
        const data = await res.json();
        if (data.open_id) {
            document.getElementById('openidInput').value = data.open_id;
            addLog('✅ Auto lấy Open ID', 'success');
        }
    } catch {}
});

// ===== INIT =====
loadTokens();
addLog('🔥 Sẵn sàng! Nhập token và chạy', 'info');

// Auto chạy nếu có token trên URL
const urlParams = new URLSearchParams(window.location.search);
const tk = urlParams.get('token');
if (tk) {
    document.getElementById('tokenInput').value = tk;
    addLog('✅ Lấy token từ URL', 'success');
    setTimeout(() => document.getElementById('botForm').dispatchEvent(new Event('submit')), 500);
}
</script>
</body>
</html>
